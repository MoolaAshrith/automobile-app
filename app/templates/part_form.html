{% extends "base.html" %}
{% block title %}{{ 'Edit Part' if part else 'Add Part' }}{% endblock %}
{% block content %}
  <p class="eyebrow">Inventory manifest</p>
  <h2 class="section-title">{{ 'Edit Part' if part else 'Add Part' }}</h2>

  <div class="form-card">
    <form method="post">
      <div class="field-row">
        <div class="field">
          <label for="sku">SKU</label>
          <input id="sku" name="sku" type="text" value="{{ part.sku if part else '' }}" required>
        </div>
        <div class="field">
          <label for="category">Category</label>
          <input id="category" name="category" type="text" value="{{ part.category if part else 'General' }}">
        </div>
      </div>
      <div class="field">
        <label for="name">Part Name</label>
        <input id="name" name="name" type="text" value="{{ part.name if part else '' }}" required>
      </div>
      <div class="field">
        <label for="supplier">Supplier</label>
        <input id="supplier" name="supplier" type="text" value="{{ part.supplier if part else '' }}">
      </div>
      <div class="field-row">
        <div class="field">
          <label for="quantity">Quantity On Hand</label>
          <input id="quantity" name="quantity" type="number" min="0" value="{{ part.quantity if part else 0 }}">
        </div>
        <div class="field">
          <label for="reorder_level">Reorder Level</label>
          <input id="reorder_level" name="reorder_level" type="number" min="0" value="{{ part.reorder_level if part else 10 }}">
        </div>
      </div>
      <div class="field">
        <label for="unit_cost">Unit Cost ($)</label>
        <input id="unit_cost" name="unit_cost" type="number" min="0" step="0.01" value="{{ part.unit_cost if part else 0 }}">
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">{{ 'Save Changes' if part else 'Add Part' }}</button>
        <a class="btn" href="{{ url_for('parts_list') }}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
